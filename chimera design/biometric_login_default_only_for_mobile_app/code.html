<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Biometric Login - Secure Retro Terminal</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "terminal-bg": "#0B0F0C",
                        "terminal-cyan": "#5CC8FF",
                        "terminal-text": "#EEEEEE",
                        "terminal-border": "#333333",
                    },
                    fontFamily: {
                        "mono": ["'IBM Plex Mono'", "monospace"],
                    },
                    animation: {
                        'cursor-blink': 'blink 1s step-end infinite',
                        'scan-line': 'scan 2s ease-in-out infinite',
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        },
                        scan: {
                            '0%': { top: '0%', opacity: '0.4' },
                            '10%': { opacity: '1' },
                            '90%': { opacity: '1' },
                            '100%': { top: '100%', opacity: '0.4' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0B0F0C;
            font-family: 'IBM Plex Mono', monospace;
        }.retro-grid {
            background-image: linear-gradient(rgba(51, 51, 51, 0.2) 1px, transparent 1px),
            linear-gradient(90deg, rgba(51, 51, 51, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-terminal-text bg-terminal-bg h-screen w-full flex flex-col overflow-hidden retro-grid selection:bg-terminal-cyan selection:text-terminal-bg">
<div class="w-full pt-14 pb-4 px-6 flex justify-between items-end bg-terminal-bg/90 backdrop-blur border-b border-terminal-border z-20">
<div class="flex flex-col gap-1">
<span class="text-[10px] text-gray-500 uppercase tracking-widest leading-none">Access Level: 0</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white text-[18px]">terminal</span>
<span class="text-xs font-bold tracking-widest text-white uppercase">SECURE<span class="text-terminal-cyan">_LINK</span></span>
</div>
</div>
<div class="flex items-center border border-terminal-border bg-white/5 px-2 py-1">
<div class="w-1.5 h-1.5 bg-terminal-cyan animate-pulse mr-2"></div>
<span class="text-[10px] text-terminal-cyan uppercase tracking-widest font-semibold">Online</span>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center relative w-full px-8">
<div class="relative w-64 h-64 flex items-center justify-center mb-10 group cursor-pointer">
<div class="absolute inset-0 border border-terminal-border bg-white/[0.02]"></div>
<div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-terminal-cyan transition-all group-hover:w-8 group-hover:h-8"></div>
<div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-terminal-cyan transition-all group-hover:w-8 group-hover:h-8"></div>
<div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-terminal-cyan transition-all group-hover:w-8 group-hover:h-8"></div>
<div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-terminal-cyan transition-all group-hover:w-8 group-hover:h-8"></div>
<div class="relative z-10">
<span class="material-symbols-outlined text-[110px] text-white opacity-90 font-light">fingerprint</span>
</div>
<div class="absolute inset-0 z-20 pointer-events-none overflow-hidden mx-1 my-1">
<div class="absolute left-0 right-0 h-[1px] bg-terminal-cyan shadow-[0_0_10px_rgba(92,200,255,0.8)] animate-scan-line"></div>
</div>
<div class="absolute inset-0 bg-terminal-cyan/5 z-0"></div>
</div>
<div class="w-full max-w-xs">
<div class="flex flex-col items-start space-y-2">
<p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mb-2 pl-1 border-l border-gray-700">// System Check: Locked</p>
<h1 class="text-xl text-white font-bold tracking-tight uppercase mb-1">Identity Verification</h1>
<div class="flex items-center w-full bg-white/5 p-3 border border-terminal-border/50">
<span class="text-terminal-cyan mr-2">$</span>
<span class="text-sm text-gray-300 tracking-wide font-medium">SCAN_BIOMETRIC</span>
<span class="w-2 h-4 bg-terminal-cyan ml-1 animate-cursor-blink"></span>
</div>
</div>
</div>
</div>
<div class="w-full pb-10 px-6 flex flex-col items-center gap-6 z-20 bg-terminal-bg pt-4">
<button class="flex items-center justify-center gap-3 px-8 py-3 w-full max-w-[280px] bg-transparent border border-terminal-border hover:border-terminal-cyan transition-colors group rounded-none">
<span class="material-symbols-outlined text-terminal-cyan text-[18px] group-hover:text-white transition-colors">dialpad</span>
<span class="text-terminal-cyan text-xs uppercase tracking-[0.15em] font-semibold group-hover:text-white transition-colors">Use PIN Entry</span>
</button>
<div class="flex flex-col items-center gap-2 opacity-50">
<div class="h-px w-12 bg-gray-700 mb-1"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-gray-400">lock</span>
<p class="text-[10px] text-gray-500 font-mono uppercase tracking-widest">End-to-End Encrypted</p>
</div>
</div>
<div class="h-2"></div>
</div>

</body></html>
