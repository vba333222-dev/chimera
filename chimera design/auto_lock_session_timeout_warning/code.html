<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Auto-lock / Session Timeout</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&amp;family=VT323&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "term-bg": "#0B0F0C",
              "term-panel": "#141A17",
              "term-amber": "#FFC857",
              "term-amber-dim": "rgba(255, 200, 87, 0.2)",
            },
            fontFamily: {
              "mono": ["'IBM Plex Mono'", "monospace"],
              "digital": ["'VT323'", "monospace"],
            },
            animation: {
                'blink': 'blink 1s step-end infinite',
                'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              }
            }
          },
        },
      }
    </script>
<style>
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 50;
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(255, 200, 87, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-term-bg font-mono text-term-amber antialiased h-screen overflow-hidden flex flex-col relative selection:bg-term-amber selection:text-term-bg">
<div class="scanlines"></div>
<div class="w-full flex justify-between items-center px-6 py-5 border-b border-term-amber/20 z-10 bg-term-bg/80 backdrop-blur-sm">
<div class="text-[10px] uppercase tracking-widest opacity-60">
            SECURE_TERM_V.4.2
        </div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 bg-term-amber rounded-full animate-blink"></span>
<span class="text-[10px] uppercase tracking-widest text-term-amber font-bold">TIMEOUT_WARNING</span>
</div>
</div>
<div class="flex-1 flex flex-col items-center justify-center px-6 w-full max-w-md mx-auto z-10 relative">
<div class="flex flex-col items-center gap-8 mb-10 w-full">
<div class="relative flex items-center justify-center w-28 h-28 border border-term-amber rounded-sm bg-term-panel shadow-[0_0_20px_rgba(255,200,87,0.1)]">
<div class="absolute -top-1 -left-1 w-2 h-2 border-t-2 border-l-2 border-term-amber"></div>
<div class="absolute -top-1 -right-1 w-2 h-2 border-t-2 border-r-2 border-term-amber"></div>
<div class="absolute -bottom-1 -left-1 w-2 h-2 border-b-2 border-l-2 border-term-amber"></div>
<div class="absolute -bottom-1 -right-1 w-2 h-2 border-b-2 border-r-2 border-term-amber"></div>
<span class="material-symbols-outlined text-5xl text-term-amber animate-pulse-slow">lock_clock</span>
</div>
<div class="flex flex-col items-center gap-4 text-center">
<h1 class="text-xl font-bold uppercase tracking-[0.15em] border-b border-dashed border-term-amber/40 pb-2">
<span class="animate-blink mr-1 text-term-amber">&gt;</span>Session Expiring
                </h1>
<p class="text-term-amber/80 text-xs leading-relaxed max-w-[280px]">
                    INACTIVITY DETECTED. AUTO-LOCK SEQUENCE INITIATED TO PREVENT UNAUTHORIZED ACCESS.
                </p>
</div>
</div>
<div class="w-full max-w-[320px] bg-term-panel border border-term-amber/30 p-1 mb-10 shadow-lg">
<div class="border border-term-amber/10 bg-[#0e1211] p-6 flex flex-col items-center gap-2 relative overflow-hidden">
<div class="absolute top-2 left-3 text-[10px] text-term-amber/40 uppercase tracking-widest">Remaining Time</div>
<div class="flex items-baseline gap-1 font-digital text-term-amber glow-text mt-2">
<span class="text-8xl leading-none">00</span>
<span class="text-8xl leading-none animate-blink pb-2">:</span>
<span class="text-8xl leading-none">29</span>
</div>
<div class="w-full h-1 bg-term-amber/10 mt-2 rounded-none overflow-hidden">
<div class="h-full bg-term-amber w-[30%]"></div>
</div>
</div>
</div>
<div class="flex flex-col gap-4 w-full max-w-[320px]">
<button class="group relative flex w-full cursor-pointer items-center justify-between border border-term-amber bg-term-amber text-term-bg px-5 h-14 hover:bg-term-amber/90 active:bg-term-amber/80 transition-all shadow-[0_0_15px_rgba(255,200,87,0.2)]">
<div class="flex flex-col items-start">
<span class="text-sm font-bold uppercase tracking-wider">Extend Session</span>
<span class="text-[10px] opacity-70 uppercase font-semibold">Re-Authentication Required</span>
</div>
<span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform">fingerprint</span>
</button>
<button class="group flex w-full cursor-pointer items-center justify-center border border-term-amber/30 text-term-amber/70 h-12 hover:border-term-amber hover:text-term-amber hover:bg-term-amber/5 transition-all">
<span class="text-xs font-bold uppercase tracking-[0.2em] group-hover:tracking-[0.25em] transition-all">Lock Now</span>
</button>
</div>
</div>
<div class="absolute bottom-6 left-0 w-full text-center pointer-events-none">
<p class="text-[10px] text-term-amber/30 font-mono uppercase tracking-widest">
            Zero-Trust Arch // E2EE Enabled
        </p>
</div>

</body></html>
